<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Hello World</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      text-align: center;
      padding: 40px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 3em;
      margin: 0;
    }

    p {
      margin-top: 10px;
      font-size: 1.2em;
      opacity: 0.9;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #2575fc;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #f0f0f0;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello, World! 🌍</h1>
    <p>Bem-vindo à sua página HTML estilizada</p>
    <button class="btn" onclick="alert('Olá! 👋')">Clique aqui</button>
  </div>
</body>
</html>
